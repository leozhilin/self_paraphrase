# PGPS9K smoke test: 1k random train subset, G=16, full eval benchmarks.
task: mllm

ftso_root: /data4/FTSO

model:
  path: /data4/FTSO/models/qwen3.5-4b
  dtype: bfloat16

sampling:
  G: 16
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  max_new_tokens: 4096
  batch_size: 16

datasets:
  hf_cache: /data4/FTSO/datasets/mllm/hf_cache
  gsm8k_cache: /data4/FTSO/datasets/mllm/hf_cache
  data_cache: /data4/FTSO/datasets/mllm/processed/cache/smoke
  pgps9k_root: /data4/FTSO/datasets/mllm/raw/pgps9k/extracted/PGPS9K
  pgps9k_full_train_jsonl: /data4/FTSO/datasets/mllm/processed/pgps9k_train.jsonl
  train_jsonl: /data4/FTSO/datasets/mllm/processed/pgps9k_train_1k_smoke.jsonl
  image_root: /data4/FTSO/datasets/mllm/images

manifest:
  selection_mode: token_matched_bin_aware
  target_tokens: 1440000
  target_nac_pct: 42.0
  ac_max_pct: 0.58
  seed: 2026

paraphrase:
  n_per: 2
  batch: 8
  max_new_tokens: 4096
  temperature: 0.7
  top_p: 0.95
  seed: 2026

sft:
  epochs: 3
  lr: 2.0e-05
  batch_size: 2
  grad_accum: 4
  max_length: 4096
  seed: 42

eval:
  mode: vision
  batch_size: 1
  max_new_tokens: 4096
  max_num_seqs: 64
  gpu_memory_utilization: 0.92
  limit: null

paths:
  vcts_root: /home/liuyu/Projects/GRPO_research/VCTS
  lzl_root: /home/liuyu/Projects/GRPO_research/VCTS/lzl
  rollouts: /data4/FTSO/datasets/mllm/processed/rollouts/pgps9k_smoke_1k_g16.jsonl
  raw_jsonl: /data4/FTSO/datasets/mllm/processed/sft/smoke/raw/raw.jsonl
  vanilla_jsonl: /data4/FTSO/datasets/mllm/processed/sft/smoke/vanilla/vanilla.jsonl
  paraphrase_candidates: /data4/FTSO/datasets/mllm/processed/cache/smoke/paraphrase_candidates.jsonl
  paraphrase_tokens: /data4/FTSO/datasets/mllm/processed/cache/smoke/paraphrase_tokens.jsonl
  paraphrase_jsonl: /data4/FTSO/datasets/mllm/processed/sft/smoke/paraphrase/paraphrase.jsonl
  para_clear_jsonl: /data4/FTSO/datasets/mllm/processed/sft/smoke/para_clear/para_clear.jsonl
  paraphrase_manifest: /data4/FTSO/datasets/mllm/processed/sft/smoke/paraphrase/manifest.json
  raw_manifest: /data4/FTSO/datasets/mllm/processed/sft/smoke/raw/manifest.json
  checkpoint_root: /data5/lzl/checkpoints/mllm_paraphrase_pgps9k_smoke
  results_root: /home/liuyu/Projects/GRPO_research/VCTS/lzl/results/mllm/smoke
  eval_cache: /data4/FTSO/datasets/mllm/processed/eval
  logs: /home/liuyu/Projects/GRPO_research/VCTS/lzl/logs/mllm/smoke
  grpo_data_root: /data4/FTSO/datasets/mllm/grpo
  mllm_eval:
    pgps9k_test:   /data4/FTSO/datasets/mllm/processed/eval/pgps9k_test_eval.jsonl
    mathverse:     /data4/FTSO/datasets/mllm/processed/eval/mathverse_eval.jsonl
    mathvision:    /data4/FTSO/datasets/mllm/processed/eval/mathvision_eval.jsonl
    realworldqa:   /data4/FTSO/datasets/mllm/processed/eval/realworldqa_eval.jsonl
    mathvista_gps: /data4/FTSO/datasets/mllm/processed/eval/mathvista_gps_eval.jsonl
    geoqa:         /data4/FTSO/datasets/mllm/processed/eval/geoqa_test_eval.jsonl
    geometry3k:    /data4/FTSO/datasets/mllm/processed/eval/geometry3k_test_eval.jsonl
    ai2d_test:     /data4/FTSO/datasets/mllm/processed/eval/ai2d_test_eval.jsonl
    mmmu_pro:      /data4/FTSO/datasets/mllm/processed/eval/mmmu_pro_eval.jsonl
