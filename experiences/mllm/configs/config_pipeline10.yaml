# 10-sample end-to-end pipeline test — all data under /data4/FTSO
task: mllm

ftso_root: /data4/FTSO

model:
  path: /data4/FTSO/models/qwen3.5-4b
  dtype: bfloat16

sampling:
  G: 4
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  max_new_tokens: 512
  batch_size: 4

datasets:
  hf_cache: /data4/FTSO/datasets/mllm/hf_cache
  gsm8k_cache: /data4/FTSO/datasets/mllm/hf_cache
  data_cache: /data4/FTSO/datasets/mllm/pipeline10/cache
  pgps9k_root: /data4/FTSO/datasets/mllm/raw/pgps9k/extracted/PGPS9K
  train_jsonl: /data4/FTSO/datasets/mllm/pipeline10/pgps9k_train_10.jsonl
  image_root: /data4/FTSO/datasets/mllm/images

manifest:
  target_tokens: 50000
  target_nac_pct: 42.0
  ac_max_pct: 0.58
  seed: 2026

paraphrase:
  n_per: 1
  batch: 4
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.95
  seed: 2026

sft:
  epochs: 1
  lr: 2.0e-05
  batch_size: 2
  grad_accum: 2
  max_length: 2048
  seed: 42

eval:
  mode: vision
  batch_size: 1
  max_new_tokens: 128
  max_num_seqs: 8
  gpu_memory_utilization: 0.85
  limit: 10

paths:
  vcts_root: /home/liuyu/Projects/GRPO_research/VCTS
  lzl_root: /home/liuyu/Projects/GRPO_research/VCTS/lzl
  rollouts: /data4/FTSO/datasets/mllm/pipeline10/rollouts/pgps9k_train_g4.jsonl
  raw_jsonl: /data4/FTSO/datasets/mllm/pipeline10/sft/raw/raw.jsonl
  vanilla_jsonl: /data4/FTSO/datasets/mllm/pipeline10/sft/vanilla/vanilla.jsonl
  paraphrase_candidates: /data4/FTSO/datasets/mllm/pipeline10/cache/paraphrase_candidates.jsonl
  paraphrase_tokens: /data4/FTSO/datasets/mllm/pipeline10/cache/paraphrase_tokens.jsonl
  paraphrase_jsonl: /data4/FTSO/datasets/mllm/pipeline10/sft/paraphrase/paraphrase.jsonl
  paraphrase_manifest: /data4/FTSO/datasets/mllm/pipeline10/sft/paraphrase/manifest.json
  raw_manifest: /data4/FTSO/datasets/mllm/pipeline10/sft/raw/manifest.json
  checkpoint_root: /data4/FTSO/checkpoints/mllm_pipeline10
  results_root: /home/liuyu/Projects/GRPO_research/VCTS/lzl/results/mllm/pipeline10
  eval_cache: /data4/FTSO/datasets/mllm/processed/eval
  logs: /home/liuyu/Projects/GRPO_research/VCTS/lzl/logs/mllm/pipeline10
  grpo_data_root: /data4/FTSO/datasets/mllm/pipeline10/grpo
  mllm_eval:
    pgps9k_test: /data4/FTSO/datasets/mllm/processed/eval/pgps9k_test_eval.jsonl
