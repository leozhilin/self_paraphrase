# GSM8K / math pipeline — data on /data4/FTSO

ftso_root: /data4/FTSO

model:
  path: /data4/FTSO/models/qwen3-4b
  dtype: bfloat16

sampling:
  G: 32
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  max_new_tokens: 4096
  batch_size: 32

datasets:
  gsm8k_cache: /data4/FTSO/datasets/gsm/hf_datasets
  data_cache: /data4/FTSO/datasets/gsm/cache

manifest:
  target_tokens: 1440000
  target_nac_pct: 42.0
  ac_max_pct: 0.58
  seed: 2026

paraphrase:
  n_per: 2
  batch: 12
  max_new_tokens: 4096
  temperature: 0.7
  top_p: 0.95
  seed: 2026

sft:
  epochs: 3
  lr: 2.0e-5
  batch_size: 16
  grad_accum: 1
  max_length: 768
  seed: 42

eval:
  batch_size: 4
  max_new_tokens: 4096

paths:
  vcts_root: /home/liuyu/Projects/GRPO_research/VCTS
  lzl_root: /home/liuyu/Projects/GRPO_research/VCTS/lzl
  rollouts: /data4/FTSO/datasets/gsm/rollouts/gsm8k_train_g32.jsonl
  raw_jsonl: /data4/FTSO/datasets/gsm/sft/raw/raw.jsonl
  vanilla_jsonl: /data4/FTSO/datasets/gsm/sft/vanilla/vanilla.jsonl
  paraphrase_candidates: /data4/FTSO/datasets/gsm/cache/paraphrase_candidates.jsonl
  paraphrase_tokens: /data4/FTSO/datasets/gsm/cache/paraphrase_tokens.jsonl
  paraphrase_jsonl: /data4/FTSO/datasets/gsm/sft/paraphrase/paraphrase.jsonl
  paraphrase_manifest: /data4/FTSO/datasets/gsm/sft/paraphrase/manifest.json
  raw_manifest: /data4/FTSO/datasets/gsm/sft/raw/manifest.json
  checkpoint_root: /data5/lzl/checkpoints
  results_root: /home/liuyu/Projects/GRPO_research/VCTS/lzl/results/gsm
  eval_cache: /data4/FTSO/datasets/gsm/cache/eval
  logs: /home/liuyu/Projects/GRPO_research/VCTS/lzl/logs/gsm
  grpo_data_root: /data4/FTSO/datasets/gsm/grpo
