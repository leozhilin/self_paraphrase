# 10-sample GSM8K e2e smoke — data4 FTSO only
ftso_root: /data4/FTSO

model:
  path: /data4/FTSO/models/qwen3-4b
  dtype: bfloat16

sampling:
  G: 4
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  max_new_tokens: 512
  batch_size: 4

datasets:
  gsm8k_cache: /data4/FTSO/datasets/gsm/hf_datasets
  data_cache: /data4/FTSO/datasets/gsm/pipeline10/cache

manifest:
  target_tokens: 50000
  target_nac_pct: 42.0
  ac_max_pct: 0.58
  seed: 2026

paraphrase:
  n_per: 1
  batch: 4
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.95
  seed: 2026

sft:
  epochs: 1
  lr: 2.0e-5
  batch_size: 4
  grad_accum: 2
  max_length: 768
  seed: 42

eval:
  batch_size: 4
  max_new_tokens: 128

paths:
  vcts_root: /home/liuyu/Projects/GRPO_research/VCTS
  lzl_root: /home/liuyu/Projects/GRPO_research/VCTS/lzl
  rollouts: /data4/FTSO/datasets/gsm/pipeline10/rollouts/gsm8k_train_g4.jsonl
  raw_jsonl: /data4/FTSO/datasets/gsm/pipeline10/sft/raw/raw.jsonl
  vanilla_jsonl: /data4/FTSO/datasets/gsm/pipeline10/sft/vanilla/vanilla.jsonl
  paraphrase_candidates: /data4/FTSO/datasets/gsm/pipeline10/cache/paraphrase_candidates.jsonl
  paraphrase_tokens: /data4/FTSO/datasets/gsm/pipeline10/cache/paraphrase_tokens.jsonl
  paraphrase_jsonl: /data4/FTSO/datasets/gsm/pipeline10/sft/paraphrase/paraphrase.jsonl
  paraphrase_manifest: /data4/FTSO/datasets/gsm/pipeline10/sft/paraphrase/manifest.json
  raw_manifest: /data4/FTSO/datasets/gsm/pipeline10/sft/raw/manifest.json
  checkpoint_root: /data4/FTSO/checkpoints/gsm_pipeline10
  results_root: /home/liuyu/Projects/GRPO_research/VCTS/lzl/results/gsm/pipeline10
  eval_cache: /data4/FTSO/datasets/gsm/cache/eval
  logs: /home/liuyu/Projects/GRPO_research/VCTS/lzl/logs/gsm/pipeline10
  grpo_data_root: /data4/FTSO/datasets/gsm/pipeline10/grpo
