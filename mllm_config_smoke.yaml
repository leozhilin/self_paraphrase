# PGPS9K smoke test: 1k random train subset, G=16, full eval benchmarks.
task: mllm

model:
  path: /data5/lzl/models/Qwen3.5-4B
  dtype: bfloat16

sampling:
  G: 16                      # smoke: half of full G=32
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  max_new_tokens: 4096
  batch_size: 16

datasets:
  hf_cache: /data5/lzl/hf_cache
  gsm8k_cache: /data5/lzl/hf_cache
  data_cache: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/cache/smoke
  pgps9k_root: /data5/lzl/datasets/pgps9k/extracted/PGPS9K
  pgps9k_full_train_jsonl: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/pgps9k_train.jsonl
  train_jsonl: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/pgps9k_train_1k_smoke.jsonl
  image_root: /data5/lzl/datasets/mllm

manifest:
  selection_mode: token_matched_bin_aware
  target_tokens: 1440000      # mllm traces are long; 480k too small -> 1.44M (~1k samples)
  target_nac_pct: 42.0
  ac_max_pct: 0.58
  seed: 2026

paraphrase:
  n_per: 2
  batch: 8
  max_new_tokens: 2560
  temperature: 0.7
  top_p: 0.95
  seed: 2026

sft:
  epochs: 3
  lr: 2.0e-05
  batch_size: 2
  grad_accum: 4
  max_length: 4096
  seed: 42

eval:
  mode: vision
  batch_size: 1
  max_new_tokens: 8192
  max_num_seqs: 64
  gpu_memory_utilization: 0.92
  limit: null                 # full eval — no subset

paths:
  vcts_root: /home/liuyu/Projects/GRPO_research/VCTS
  lzl_root: /home/liuyu/Projects/GRPO_research/VCTS/lzl
  rollouts: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/rollouts/pgps9k_smoke_1k_g16.jsonl
  raw_jsonl: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/sft/smoke/raw/raw.jsonl
  vanilla_jsonl: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/sft/smoke/vanilla/vanilla.jsonl
  paraphrase_candidates: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/cache/smoke/paraphrase_candidates.jsonl
  paraphrase_tokens: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/cache/smoke/paraphrase_tokens.jsonl
  paraphrase_jsonl: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/sft/smoke/paraphrase/paraphrase.jsonl
  paraphrase_manifest: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/sft/smoke/paraphrase/manifest.json
  raw_manifest: /home/liuyu/Projects/GRPO_research/VCTS/lzl/data/mllm/sft/smoke/raw/manifest.json
